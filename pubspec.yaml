name: control_de_gastos
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.2.0+4

environment:
  sdk: '>=3.0.0 <4.0.0' # Adjust SDK version as needed

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2
  package_info_plus: ^8.0.0 # To read app version from pubspec.yaml
  
  # Drift for database
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0 # For Flutter applications
  path_provider: ^2.0.0 # To find a suitable location for the database
  path: ^1.8.0 # To join paths
  flutter_bloc: ^8.1.3 # State management library
  equatable: ^2.0.5 # For value equality in BLoC states and events
  fl_chart: ^1.1.1
  share_plus: ^12.0.1
  excel: ^4.0.0
  permission_handler: ^11.3.1
  pdf: ^3.11.1
  printing: ^5.13.2
  file_picker: ^10.3.10
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^21.0.0-dev.2
  timezone: ^0.11.0
  #intl: ^0.18.1 # For internationalization, including date and number formatting

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

  drift_dev: ^2.14.0 # Code generator for drift
  build_runner: ^2.4.0 # Code generator runner
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/saving_money_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/saving_money_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/saving_money_logo.png